<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="INJINITY is currently engineering its digital portal. Next-gen custom software, cloud architecture, and intelligent systems are under construction.">
  <title>INJINITY | Digital Portal Under Construction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Layer -->
  <div class="bg-canvas-container">
    <canvas id="particle-canvas"></canvas>
  </div>
  <div class="mesh-glow"></div>
  <div class="mesh-glow-left"></div>

  <!-- Main Construction Shell -->
  <main class="construction-container">
    <div class="construction-card reveal">
      
      <!-- Brand Logo -->
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        INJINITY
      </div>

      <!-- Construction Badge -->
      <div class="status-badge">
        <span></span>Portal Engineering In Progress
      </div>

      <!-- Main Heading -->
      <h1>Under Construction.</h1>
      
      <!-- Description -->
      <p class="lead-text" style="margin-bottom: 0;">We are engineering a resilient, custom software delivery platform. Our main digital systems are being tuned for production scale.</p>

    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
